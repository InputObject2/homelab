# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.1.2/charts/library/common/values.schema.json
controllers:
  main:
    type: statefulset
    replicas: 1
    containers:
      main:
        image:
          repository: ghcr.io/home-assistant/home-assistant
          tag: 2026.5.3@sha256:ff875078181a0383bf3fca9f061be12d6180896dbd531de04e094e25505b0bb9
        resources:
          requests:
            cpu: 50m
            memory: 1400Mi
          limits:
            cpu: 2000m
            memory: 2400Mi
        ports:
          - containerPort: 8123
            name: http
            protocol: TCP
          - containerPort: 5060
            name: sip
            protocol: UDP
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false

service:
  voip:
    controller: main
    type: LoadBalancer
    annotations:
      external-dns.alpha.kubernetes.io/hostname: ha-voip.example.com.
    ports:
      sip:
        port: 5060
        protocol: UDP
  main:
    controller: main
    ports:
      http:
        port: 8123

ingress:
  main:
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-production-dns01
      external-dns.alpha.kubernetes.io/hostname: home-assistant.example.com.
      kubernetes.io/ingress.class: nginx
      nginx.org/websocket-services: home-assistant
      hajimari.io/enable: "true"
    hosts:
      - host: home-assistant.example.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http

    tls:
      - secretName: tls-home-assistant
        hosts:
          - home-assistant.example.com

persistence:
  config:
    existingClaim: pvc-home-assistant-nas
    advancedMounts:
      main:
        main:
          - path: /config
  python-packages:
    existingClaim: home-assistant-python-packages
    advancedMounts:
      main:
        main:
          - path: /usr/local/lib/python3/site-packages
  dockerenv-bugfix:
    type: emptyDir
    medium: Memory
    advancedMounts:
      main:
        main:
          - path: /config/.dockerenv

rawResources: {}
