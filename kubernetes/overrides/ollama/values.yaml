---
ollama:
  gpu:
    enabled: true
    nvidiaResource: gpu.intel.com/i915
  models:
    clean: true
    pull:
      - qwen3:4b
      - qwen3:8b
      - qwen3:14b
      - qwen3:30b-a3b
      - qwen3-coder:30b
      - gemma3:27b
      - deepseek-r1:7b
      - deepseek-r1:14b
      - granite4:3b
      - cogito:8b
      - cogito:14b
      - glm4:9b
      - deepseek-ocr:3b
      - nomic-embed-text

#persistentVolume:
#  enabled: true
#  accessModes:
#    - ReadWriteMany
#  size: 300Gi
#  storageClass: "truenas-nfs-nas"

image:
  tag: 0.17.7

extraEnv:
  - name: OLLAMA_VULKAN
    value: "1"     # enable Vulkan backend for GPU acceleration
  - name: OLLAMA_NUM_GPU
    value: "999"   # offload all layers to GPU
  - name: no_proxy
    value: "localhost,127.0.0.1"
  - name: OLLAMA_KEEP_ALIVE
    value: "5m"   # reduce idle timeout to free GPU memory when not in use
  - name: OLLAMA_CONTEXT_LENGTH
    value: "16384"  # increase context length for better performance with large models
  - name: OLLAMA_KV_CACHE_TYPE
    value: "q8_0"  # use quantized KV cache to reduce memory usage
  - name: OLLAMA_FLASH_ATTENTION
    value: "1"     # enable flash attention for faster transformer computations

persistentVolume:
  enabled: true
  existingClaim: ollama-models-hostpath

extraObjects:
  - apiVersion: v1
    kind: PersistentVolume
    metadata:
      name: ollama-models-hostpath
    spec:
      capacity:
        storage: 200Gi
      accessModes:
        - ReadWriteMany
      hostPath:
        path: /mnt/ollama
        type: DirectoryOrCreate
      nodeAffinity:
        required:
          nodeSelectorTerms:
            - matchExpressions:
                - key: intel.feature.node.kubernetes.io/gpu
                  operator: In
                  values:
                    - "true"
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: ollama-models-hostpath
      namespace: ollama
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: 200Gi
      volumeName: ollama-models-hostpath
      storageClassName: ""