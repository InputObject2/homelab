---
ollama:
  gpu:
    enabled: true
    nvidiaResource: gpu.intel.com/i915
  models:
    clean: true
    pull:
      # Qwen3 family - drop the redundant small sizes, keep useful steps
      - qwen3:4b        # fast everyday use
      - qwen3:14b       # sweet spot
      - qwen3:30b-a3b   # MoE, runs light, replaces 32b

      # Qwen3 Coder - just the one
      - qwen3-coder:30b

      # Gemma3 - skip 4b and 12b, 27b covers it
      - gemma3:27b

      # IBM Granite
      - granite4:3b     # fast/light, different enough to keep

      # Cogito
      - cogito:8b
      - cogito:14b

      # Specialized
      - deepseek-ocr:3b
      - nomic-embed-text

#persistentVolume:
#  enabled: true
#  accessModes:
#    - ReadWriteMany
#  size: 300Gi
#  storageClass: "truenas-nfs-nas"

image:
  tag: 0.17.7

extraEnv:
  - name: OLLAMA_VULKAN
    value: "1"     # enable Vulkan backend for GPU acceleration
  - name: OLLAMA_NUM_GPU
    value: "999"   # offload all layers to GPU
  - name: no_proxy
    value: "localhost,127.0.0.1"

persistentVolume:
  enabled: true
  existingClaim: ollama-models-hostpath

extraObjects:
  - apiVersion: v1
    kind: PersistentVolume
    metadata:
      name: ollama-models-hostpath
    spec:
      capacity:
        storage: 200Gi
      accessModes:
        - ReadWriteMany
      hostPath:
        path: /mnt/ollama
        type: DirectoryOrCreate
      nodeAffinity:
        required:
          nodeSelectorTerms:
            - matchExpressions:
                - key: intel.feature.node.kubernetes.io/gpu
                  operator: In
                  values:
                    - "true"
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: ollama-models-hostpath
      namespace: ollama
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: 200Gi
      volumeName: ollama-models-hostpath
      storageClassName: ""