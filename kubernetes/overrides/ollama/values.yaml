---
ollama:
  gpu:
    enabled: true
    nvidiaResource: gpu.intel.com/i915
  models:
    clean: true
    pull:
      # Fast everyday (fully GPU-resident, ~25-30 tok/s)
      - qwen3.5:4b
      - qwen3.5:9b
      # Mid-range
      - qwen3:14b
      # Heavy reasoning/coding (slow, partially CPU-offloaded)
      - qwen3.6:35b
      - qwen3:30b-a3b
      - qwen3-coder:30b
      - qwen3.5:27b
      - gemma3:27b
      # Reasoning (English-focused)
      - deepseek-r1:7b
      - deepseek-r1:14b
      # Specialized
      - deepseek-ocr:3b
      - nomic-embed-text

image:
  repository: ollama/ollama
  tag: 0.21.0-extra

extraEnv:
  # --- GPU ---
  - name: OLLAMA_NUM_GPU
    value: "999"
  - name: OLLAMA_VULKAN
    value: "1"

  # --- Memory ---
  - name: OLLAMA_CONTEXT_LENGTH
    value: "16384"
  - name: OLLAMA_FLASH_ATTENTION
    value: "0"
  - name: OLLAMA_GPU_OVERHEAD
    value: "536870912"

  # --- Scheduling ---
  - name: OLLAMA_KEEP_ALIVE
    value: "5m"
  - name: OLLAMA_MAX_LOADED_MODELS
    value: "2"
  - name: OLLAMA_NUM_PARALLEL
    value: "1"

  # --- Stability ---
  - name: no_proxy
    value: "localhost,127.0.0.1"
  - name: OLLAMA_NO_CLOUD
    value: "true"

persistentVolume:
  enabled: true
  existingClaim: ollama-models-hostpath

extraObjects:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: ollama-models-hostpath
      namespace: ollama
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: 200Gi
      volumeName: ollama-models-hostpath
      storageClassName: ""
  - apiVersion: v1
    kind: PersistentVolume
    metadata:
      name: ollama-models-hostpath
    spec:
      capacity:
        storage: 200Gi
      accessModes:
        - ReadWriteMany
      # We're using hostPath over the nfs shares here
      # because loading a multi-gigabyte model over the
      # network is very slow compared to local nvme storage.
      hostPath:
        path: /mnt/ollama
        type: DirectoryOrCreate
      nodeAffinity:
        required:
          nodeSelectorTerms:
            - matchExpressions:
                - key: intel.feature.node.kubernetes.io/gpu
                  operator: In
                  values:
                    - "true"