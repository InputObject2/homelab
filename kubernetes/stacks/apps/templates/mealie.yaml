apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mealie
  namespace: argocd-system
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: {{ .Values.repoURL | quote }}
      targetRevision: {{ .Values.targetRevision }}
      path: kubernetes/umbrella-charts/mealie
      helm:
        values: |
          mealie:
            ingress:
              main:
                enabled: true
                className: nginx
                annotations:
                  external-dns.alpha.kubernetes.io/hostname: {{ include "apps.mealie.hostname" . }}.
                  cert-manager.io/cluster-issuer: letsencrypt-production-dns01
                hosts:
                  - host: {{ include "apps.mealie.hostname" . }}
                    paths:
                      - path: /
                        pathType: Prefix
                tls:
                  - secretName: recettes-tls
                    hosts:
                      - {{ include "apps.mealie.hostname" . }}
            controllers:
              main:
                containers:
                  main:
                    env:
                      BASE_URL: "https://{{ include "apps.mealie.hostname" . }}"
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: mealie
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
