apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: itop
  namespace: argocd-system
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
     - repoURL: https://bjw-s-labs.github.io/helm-charts/
      chart: app-template
      targetRevision: 4.1.2
      helm:
        valueFiles:
          - $values/kubernetes/overrides/itop/values.yaml
        values: |
          controllers:
            main:
              containers:
                main:
                  image:
                    repository: {{ include "apps.itop.image" . }}
          ingress:
            enabled: true
            className: nginx
            annotations:
              external-dns.alpha.kubernetes.io/hostname: {{ include "apps.itop.hostname" . }}.
              cert-manager.io/cluster-issuer: letsencrypt-production-dns01
              kubernetes.io/ingress.class: nginx
              hajimari.io/enable: "true"
            hosts:
              - host: {{ include "apps.itop.hostname" . }}
                paths:
                  - path: /
                    pathType: ImplementationSpecific
            tls:
              - secretName: issues-tls
                hosts:
                  - {{ include "apps.itop.hostname" . }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: itop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
