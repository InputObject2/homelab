apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docker-private-registry-v2
  namespace: argocd-system
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://bjw-s-labs.github.io/helm-charts/
      chart: app-template
      targetRevision: 4.1.2
      helm:
        valueFiles:
          - $values/kubernetes/overrides/docker-private-registry/values.yaml
        parameters:
          - name: 'ingress.main.annotations.external-dns\.alpha\.kubernetes\.io/hostname'
            value: 'docker-private-registry-v2.{{ .Values.domain }}.'
          - name: 'ingress.main.hosts[0].host'
            value: 'docker-private-registry-v2.{{ .Values.domain }}'
          - name: 'ingress.main.tls[0].hosts[0]'
            value: 'docker-private-registry-v2.{{ .Values.domain }}'
    - repoURL: {{ .Values.repoURL | quote }}
      targetRevision: {{ .Values.targetRevision }}
      ref: values
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: registry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
