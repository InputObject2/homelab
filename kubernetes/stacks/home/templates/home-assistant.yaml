apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argocd-system
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://bjw-s-labs.github.io/helm-charts/
      chart: app-template
      targetRevision: 4.1.2
      helm:
        valueFiles:
          - $values/kubernetes/overrides/home-assistant/values.yaml
        parameters:
          - name: "ingress.main.annotations.external-dns\\.alpha\\.kubernetes\\.io/hostname"
            value: '{{ include "home.homeAssistant.hostname" . }}.'
          - name: "ingress.main.hosts[0].host"
            value: '{{ include "home.homeAssistant.hostname" . }}'
          - name: "ingress.main.tls[0].hosts[0]"
            value: '{{ include "home.homeAssistant.hostname" . }}'
          - name: "ingress.main.hosts[0].host"
            value: '{{ include "home.homeAssistant.hostname" . }}'
    - repoURL: {{ .Values.repoURL | quote }}
      targetRevision: {{ .Values.targetRevision }}
      ref: values
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: home-assistant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
