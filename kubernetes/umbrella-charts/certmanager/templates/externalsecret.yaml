---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: kube-system
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: apps/certmanager/cloudflare
        property: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: certmanager-self-signed-ca
  namespace: kube-system
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: certmanager-self-signed-ca
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: apps/certmanager/self-signed
        property: certificate
        decodingStrategy: Base64
    - secretKey: tls.key
      remoteRef:
        key: apps/certmanager/self-signed
        property: key
        decodingStrategy: Base64
