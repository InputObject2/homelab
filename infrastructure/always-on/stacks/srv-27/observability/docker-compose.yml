version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v3.11.3@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090/tcp"
    volumes:
      - /opt/ansible-pull/infrastructure/always-on/stacks/srv-27/observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - /opt/ansible-pull/infrastructure/always-on/stacks/srv-27/observability/prometheus-rules.yaml:/etc/prometheus/prometheus-rules.yaml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:13.0.1@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000/tcp"
    volumes:
      - grafana_data:/var/lib/grafana
      - /opt/ansible-pull/infrastructure/always-on/stacks/srv-27/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - /opt/ansible-pull/infrastructure/always-on/stacks/srv-27/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    env_file:
      - /opt/secrets/observability/observability.env

  loki:
    image: grafana/loki:3.7.2@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100/tcp"
    volumes:
      - /opt/ansible-pull/infrastructure/always-on/stacks/srv-27/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  tempo:
    image: grafana/tempo:2.9.2@sha256:3f0825e14397d3459e11e96f99ddd3976ec0cb75e328459e173298d9fb74b407
    container_name: tempo
    restart: unless-stopped
    ports:
      - "3200:3200/tcp"
      - "4317:4317/tcp"
      - "4318:4318/tcp"
    volumes:
      - /opt/ansible-pull/infrastructure/always-on/stacks/srv-27/observability/tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    command:
      - '-config.file=/etc/tempo/tempo.yaml'

  influxdb:
    image: influxdb:2.9.1@sha256:bfe360b59cb6a351a648cb2df37e559f0c0436248c2e05876cace58c26072ecc
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086/tcp"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    env_file:
      - /opt/secrets/observability/observability.env

  promtail:
    image: grafana/promtail:3.6.10@sha256:2a0f5e3e160ee5d549c585f6cc4f4e1c566ff783324a424bd75bc16503fc660e
    container_name: promtail
    restart: unless-stopped
    ports:
      - "1514:1514/udp"
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /opt/ansible-pull/infrastructure/always-on/stacks/srv-27/observability/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - promtail_positions:/run/promtail/
    command:
      - '-config.file=/etc/promtail/config.yaml'

  xcp-ng:
    image: ghcr.io/mikedombo/xen-exporter:latest@sha256:6f384c24a396e41bf859e258b9337954ecc445571d3aa8e9c5f3670df8292232
    container_name: xcp-ng-exporter
    restart: unless-stopped
    env_file:
      - /opt/secrets/xcp-ng/xcp-ng.env

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  influxdb_data:
  promtail_positions:
