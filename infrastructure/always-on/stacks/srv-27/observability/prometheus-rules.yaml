groups:
  - name: domain-controllers
    rules:
      - alert: DomainControllerNodeExporterDown
        expr: up{job="node", instance=~"us20-dc-63165\.core:9100|us20-dc-97332\.core:9100"} == 0
        for: 2m
        labels:
          severity: warning
          group: domain_controllers
        annotations:
          summary: "Node exporter down on {{ $labels.instance }}"
          description: "Prometheus has failed to scrape node-exporter for more than 2 minutes."

      - alert: DomainControllerSambaExporterDown
        expr: up{job="dc-samba-ad-exporter"} == 0
        for: 2m
        labels:
          severity: critical
          group: domain_controllers
        annotations:
          summary: "Samba AD exporter down on {{ $labels.instance }}"
          description: "samba-ad-exporter has not been reachable for more than 2 minutes."

      - alert: SambaReplicationUnhealthy
        expr: samba_ad_replication_status < 1
        for: 5m
        labels:
          severity: critical
          group: domain_controllers
        annotations:
          summary: "Replication unhealthy on {{ $labels.instance }}"
          description: "Replication status is unhealthy for partner {{ $labels.partner }} and NC {{ $labels.nc }}."

      - alert: SambaReplicationFailuresIncreasing
        expr: delta(samba_ad_replication_consecutive_failures_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
          group: domain_controllers
        annotations:
          summary: "Replication failures increasing on {{ $labels.instance }}"
          description: "Consecutive replication failures increased in the last 15 minutes for partner {{ $labels.partner }} and NC {{ $labels.nc }}."

      - alert: SambaTLSCertificateExpiringSoon
        expr: samba_ad_tls_cert_expiry_seconds < 1209600
        for: 15m
        labels:
          severity: warning
          group: domain_controllers
        annotations:
          summary: "TLS certificate expiring soon on {{ $labels.instance }}"
          description: "Samba AD TLS certificate expires in less than 14 days."

      - alert: SambaServiceNotRunning
        expr: samba_ad_service_running == 0
        for: 2m
        labels:
          severity: critical
          group: domain_controllers
        annotations:
          summary: "Samba service not running on {{ $labels.instance }}"
          description: "samba-ad-dc is not active according to exporter metrics."
