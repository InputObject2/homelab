version: '3.8'

services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - homeassistant_config:/config
      - /run/dbus:/run/dbus:ro
    env_file:
      - /opt/secrets/homeassistant/homeassistant.env

  matterbridge:
    image: 42wim/matterbridge:latest
    container_name: matterbridge
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./matterbridge.toml:/etc/matterbridge/matterbridge.toml
      - matterbridge_data:/data
    env_file:
      - /opt/secrets/matterbridge/matterbridge.env

  freepbx:
    image: tiredofit/freepbx:latest
    container_name: freepbx
    restart: unless-stopped
    ports:
      - "5060:5060/tcp"
      - "5060:5060/udp"
      - "5160:5160/tcp"
      - "5160:5160/udp"
      - "10000-20000:10000-20000/udp"
    volumes:
      - freepbx_data:/var/lib/asterisk
      - freepbx_config:/etc/asterisk
    env_file:
      - /opt/secrets/voip/voip.env
    depends_on:
      - mysql

  tftpd:
    image: pghalliday/tftp:latest
    container_name: tftpd
    restart: unless-stopped
    ports:
      - "69:69/udp"
    volumes:
      - ./tftpboot:/tftpboot

  mysql:
    image: mariadb:latest
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306/tcp"
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - /opt/secrets/voip/voip.env

  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    restart: unless-stopped
    ports:
      - "9001:9001/tcp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes

volumes:
  homeassistant_config:
  matterbridge_data:
  freepbx_data:
  freepbx_config:
  mysql_data:
