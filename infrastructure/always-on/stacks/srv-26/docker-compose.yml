version: '3.8'

services:
  technitium:
    image: technitium/dns-server:latest
    container_name: technitium
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "5380:5380/tcp"
    volumes:
      - technitium_data:/etc/technitium
    env_file:
      - /opt/secrets/technitium/technitium.env

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - tailscale_data:/var/lib/tailscale
    env_file:
      - /opt/secrets/tailscale/tailscale.env

  omada-controller:
    image: mbentley/omada-controller:latest
    container_name: omada
    restart: unless-stopped
    ports:
      - "8088:8088/tcp"
      - "8043:8043/tcp"
      - "29810:29810/udp"
      - "29811:29811/tcp"
      - "29812:29812/tcp"
    volumes:
      - omada_data:/opt/tplink/EAPController/data
    env_file:
      - /opt/secrets/omada/omada.env

  gatus:
    image: twinproduction/gatus:latest
    container_name: gatus
    restart: unless-stopped
    ports:
      - "8080:8080/tcp"
    volumes:
      - ./gatus-config.yaml:/etc/gatus/config.yaml
    env_file:
      - /opt/secrets/gatus/gatus.env

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    ports:
      - "8090:80/tcp"
    volumes:
      - ntfy_data:/var/lib/ntfy
    env_file:
      - /opt/secrets/ntfy/ntfy.env

  github-runner:
    image: myoung34/github-runner:latest
    container_name: github-runner
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_data:/home/runner
    env_file:
      - /opt/secrets/github-runner/github-runner.env

volumes:
  technitium_data:
  tailscale_data:
  omada_data:
  ntfy_data:
  runner_data:
