version: '3.8'

services:
  tailscale:
    image: tailscale/tailscale:v1.94.2@sha256:95e528798bebe75f39b10e74e7051cf51188ee615934f232ba7ad06a3390ffa1
    container_name: tailscale
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - tailscale_data:/var/lib/tailscale
    env_file:
      - /opt/secrets/tailscale/tailscale.env

  gatus:
    image: twinproduction/gatus:v5.35.0@sha256:21609f31be8c4e680ce3004b24276305666239c99aff58391503f3fb6142f39d
    container_name: gatus
    restart: unless-stopped
    ports:
      - "8080:8080/tcp"
    volumes:
      - ./gatus-config.yaml:/etc/gatus/config.yaml
    env_file:
      - /opt/secrets/gatus/gatus.env

  ntfy:
    image: binwiederhier/ntfy:v2.21.0@sha256:2b9e12d56a538f4402da51328eeca02696c4b207ab7fbe031c27e51a22ca9b86
    container_name: ntfy
    restart: unless-stopped
    ports:
      - "8090:80/tcp"
    volumes:
      - ntfy_data:/var/lib/ntfy
    env_file:
      - /opt/secrets/ntfy/ntfy.env

volumes:
  tailscale_data:
  ntfy_data:
