version: '3.8'

services:
  omada-controller:
    image: mbentley/omada-controller:6.2.10.17-openj9@sha256:aae1c0a2c19104c59198118233d50e5b0102e49e69474aeafd0f9ed50112e05d
    container_name: omada
    restart: unless-stopped
    ports:
      - "8088:8088/tcp"
      - "8043:8043/tcp"
      - "29810:29810/udp"
      - "29811:29811/tcp"
      - "29812:29812/tcp"
    volumes:
      - omada_data:/opt/tplink/EAPController/data
    env_file:
      - /opt/secrets/omada/omada.env

volumes:
  omada_data:
