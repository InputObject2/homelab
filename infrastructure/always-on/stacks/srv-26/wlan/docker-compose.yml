version: '3.8'

services:
  omada-controller:
    image: mbentley/omada-controller:6.2.10.17-openj9@sha256:20d9b9e51d7297c33bdad805b5a9e5d1388222261b4391cce1785ac7c579a302
    container_name: omada
    restart: unless-stopped
    ports:
      - "8088:8088/tcp"
      - "8043:8043/tcp"
      - "29810:29810/udp"
      - "29811:29811/tcp"
      - "29812:29812/tcp"
    volumes:
      - omada_data:/opt/tplink/EAPController/data
    env_file:
      - /opt/secrets/omada/omada.env

volumes:
  omada_data:
