version: '3.8'

services:
  omada-controller:
    image: mbentley/omada-controller:6.2.14.11-openj9@sha256:06736e4ac7aff7292c4dc85b4fda1f3cd91c45b550119f86dab133368900e192
    container_name: omada
    restart: unless-stopped
    ports:
      - "8088:8088/tcp"
      - "8043:8043/tcp"
      - "29810:29810/udp"
      - "29811:29811/tcp"
      - "29812:29812/tcp"
    volumes:
      - omada_data:/opt/tplink/EAPController/data
    env_file:
      - /opt/secrets/omada/omada.env

volumes:
  omada_data:
