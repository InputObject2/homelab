---
# Deploy Portainer server or agent

- name: Create Portainer data directory (server)
  ansible.builtin.file:
    path: /opt/stacks/portainer
    state: directory
    mode: '0755'
  when: portainer_role == "server"

- name: Deploy Portainer server
  community.docker.docker_container:
    name: portainer
    image: "portainer/portainer-ce:{{ portainer_version }}"
    restart_policy: unless-stopped
    ports:
      - "9443:9443"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
  when: portainer_role == "server"

- name: Deploy Portainer agent
  community.docker.docker_container:
    name: portainer-agent
    image: "portainer/agent:{{ portainer_version }}"
    restart_policy: unless-stopped
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    env:
      AGENT_PORT: "9001"
      EDGE: "0"
  when: portainer_role == "agent"
