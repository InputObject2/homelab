---
- name: Create promtail system user
  ansible.builtin.user:
    name: promtail
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    groups: adm
    append: true

- name: Create promtail directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: promtail
    group: promtail
    mode: "0755"
  loop:
    - "{{ promtail_config_dir }}"
    - "{{ promtail_positions_dir }}"

- name: Download promtail binary archive
  ansible.builtin.get_url:
    url: >-
      https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-{{ promtail_arch }}.zip
    dest: /tmp/promtail-{{ promtail_version }}.zip
    mode: "0644"
    timeout: 60

- name: Install unzip
  ansible.builtin.apt:
    name: unzip
    state: present

- name: Extract promtail binary
  ansible.builtin.unarchive:
    src: /tmp/promtail-{{ promtail_version }}.zip
    dest: /usr/local/bin/
    remote_src: true
    include:
      - promtail-{{ promtail_arch }}
    owner: root
    group: root
    mode: "0755"

- name: Symlink versioned binary to promtail
  ansible.builtin.file:
    src: /usr/local/bin/promtail-{{ promtail_arch }}
    dest: /usr/local/bin/promtail
    state: link

- name: Template promtail config
  ansible.builtin.template:
    src: promtail-config.yaml.j2
    dest: "{{ promtail_config_dir }}/config.yaml"
    owner: promtail
    group: promtail
    mode: "0640"
  notify: restart promtail

- name: Template promtail systemd service
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart promtail

- name: Enable and start promtail
  ansible.builtin.systemd:
    name: promtail
    enabled: true
    state: started
    daemon_reload: true
